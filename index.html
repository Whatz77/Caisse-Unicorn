<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNICORN — Primes Employés</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08050f;
    --panel: #110d1f;
    --card: #1a1030;
    --border: #3b1f5e;
    --accent: #c084fc;
    --accent2: #e879f9;
    --danger: #ff4f6a;
    --gold: #ffd700;
    --text: #e2eaf5;
    --muted: #6b82a0;
    --prime-color: #e879f9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(192,132,252,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(232,121,249,0.05) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.3); }
  }

  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header span {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .server-badge {
    background: rgba(232,121,249,0.1);
    border: 1px solid rgba(232,121,249,0.3);
    color: var(--accent2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* PRODUCTS PANEL */
  .products-panel {
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CATEGORY FILTER */
  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .cat-btn:hover, .cat-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,194,255,0.08);
  }

  /* PRODUCT GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(192,132,252,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .product-card:hover {
    border-color: rgba(192,132,252,0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .product-card:hover::before { opacity: 1; }

  .product-emoji {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }
  .product-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text);
  }
  .product-price {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .product-prime {
    font-size: 0.78rem;
    color: var(--accent2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .product-prime::before {
    content: '★';
    font-size: 0.65rem;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 30px; height: 30px;
    background: rgba(192,132,252,0.1);
    border: 1px solid rgba(192,132,252,0.3);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .qty-btn:hover {
    background: rgba(192,132,252,0.2);
    border-color: var(--accent);
  }
  .qty-btn.minus {
    background: rgba(255,79,106,0.1);
    border-color: rgba(255,79,106,0.3);
    color: var(--danger);
  }
  .qty-btn.minus:hover {
    background: rgba(255,79,106,0.2);
    border-color: var(--danger);
  }
  .qty-display {
    flex: 1;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    width: 50px;
  }
  .qty-display:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* CART PANEL */
  .cart-panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .cart-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .cart-count {
    background: var(--accent);
    color: var(--bg);
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-track { background: transparent; }
  .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cart-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .cart-empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.4; }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,58,95,0.5);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateX(10px); }
    to { opacity:1; transform:translateX(0); }
  }
  .cart-item-emoji { font-size: 1.3rem; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .cart-item-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .cart-item-prime-badge {
    font-size: 0.7rem;
    color: var(--accent2);
    font-weight: 600;
  }
  .cart-item-price {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
    white-space: nowrap;
  }
  .cart-item-prime-price {
    font-size: 0.72rem;
    color: var(--accent2);
    text-align: right;
  }
  .remove-btn {
    background: none;
    border: none;
    color: rgba(255,79,106,0.5);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--danger); }

  /* SUMMARY */
  .cart-summary {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: rgba(0,0,0,0.2);
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .summary-row.total {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    border-top: 1px solid var(--border);
    margin-top: 6px;
    padding-top: 12px;
  }
  .summary-row.prime {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    margin-top: 2px;
  }
  .summary-val { font-weight: 600; }
  .summary-val.green { color: var(--accent2); }
  .summary-val.blue { color: var(--accent); }

  /* PRIME HIGHLIGHT BOX */
  .prime-box {
    background: linear-gradient(135deg, rgba(232,121,249,0.08), rgba(192,132,252,0.05));
    border: 1px solid rgba(232,121,249,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 12px;
  }
  .prime-box-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .prime-box-amount {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(232,121,249,0.4);
  }
  .prime-box-sub {
    font-size: 0.72rem;
    color: rgba(232,121,249,0.6);
    margin-top: 2px;
  }

  /* BUTTONS */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    padding: 11px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-reset {
    background: rgba(255,79,106,0.15);
    color: var(--danger);
    border: 1px solid rgba(255,79,106,0.3);
  }
  .btn-reset:hover {
    background: rgba(255,79,106,0.25);
    border-color: var(--danger);
  }
  .btn-validate {
    background: linear-gradient(135deg, #c084fc, #9333ea);
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 15px rgba(192,132,252,0.3);
  }
  .btn-validate:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(192,132,252,0.4);
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 70px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* SCROLLBAR */
  .products-panel::-webkit-scrollbar { width: 4px; }
  .products-panel::-webkit-scrollbar-track { background: transparent; }
  .products-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* MOBILE */
  @media (max-width: 720px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: auto;
    }
    .cart-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: auto;
      max-height: 55vh;
      border-top: 2px solid var(--border);
      z-index: 50;
    }
    .products-panel {
      padding-bottom: 340px;
      border-right: none;
    }
    .products-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <div>
    <h1>UNICORN</h1>
    <span>Système de primes employés</span>
  </div>
  <div class="header-right">
    <span class="server-badge">● EN LIGNE</span>
  </div>
</header>

<div class="app">
  <!-- PRODUCTS -->
  <div class="products-panel">
    <div class="section-title">Produits</div>

    <div class="categories" id="categories"></div>

    <div class="products-grid" id="products-grid"></div>
  </div>

  <!-- CART -->
  <div class="cart-panel">
    <div class="cart-header">
      <span class="cart-title">Commande</span>
      <span class="cart-count" id="cart-count">0</span>
    </div>

    <div class="cart-items" id="cart-items">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        Aucun produit sélectionné
      </div>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Sous-total articles</span>
        <span class="summary-val blue" id="sum-items">$0</span>
      </div>
      <div class="summary-row total">
        <span>Total vente</span>
        <span class="summary-val blue" id="sum-total">$0</span>
      </div>

      <div class="prime-box">
        <div class="prime-box-label">💰 Prime employé</div>
        <div class="prime-box-amount" id="prime-amount">$0</div>
        <div class="prime-box-sub" id="prime-sub">Aucune vente enregistrée</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-reset" onclick="resetCart()">↺ Reset</button>
        <button class="btn btn-validate" onclick="validateOrder()">✓ Valider</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== PRODUCTS DATA ======
const products = [
  // Biere
  { id: 1,  name: "Jupiler",           emoji: "🍺", price: 10,  prime: 4,  category: "Biere" },
  { id: 2,  name: "Biere Simple",      emoji: "🍺", price: 15,  prime: 6,  category: "Biere" },
  { id: 3,  name: "Biere Triple",      emoji: "🍺", price: 35,  prime: 14, category: "Biere" },
  // Alcool
  { id: 4,  name: "Whisky",            emoji: "🥃", price: 45,  prime: 18, category: "Alcool" },
  { id: 5,  name: "Vodka",             emoji: "🥃", price: 40,  prime: 16, category: "Alcool" },
  { id: 6,  name: "Rhum",              emoji: "🥃", price: 40,  prime: 16, category: "Alcool" },
  { id: 7,  name: "Vodka Cherry",      emoji: "🍒", price: 50,  prime: 20, category: "Alcool" },
  // Vin
  { id: 8,  name: "Vin",               emoji: "🍷", price: 70,  prime: 28, category: "Vin" },
  { id: 9,  name: "Champagne",         emoji: "🍾", price: 150, prime: 60, category: "Vin" },
  { id: 10, name: "Magnum",            emoji: "🍾", price: 200, prime: 80, category: "Vin" },
  // Soft/En-cas
  { id: 11, name: "Chips",             emoji: "🍟", price: 5,   prime: 2,  category: "Soft" },
  { id: 12, name: "Biere Sans Alcool", emoji: "🥤", price: 8,   prime: 3,  category: "Soft" },
  { id: 13, name: "Soda",              emoji: "🥤", price: 5,   prime: 2,  category: "Soft" },
  { id: 14, name: "Eau",               emoji: "💧", price: 5,   prime: 2,  category: "Soft" },
  // Danse Prive
  { id: 17, name: "Danse 10min",       emoji: "💃", price: 200, prime: 120, category: "Danse Prive" },
  { id: 18, name: "Danse 20min",       emoji: "💃", price: 400, prime: 240, category: "Danse Prive" },
  { id: 19, name: "Supplement 5min",   emoji: "⏱️",  price: 75,  prime: 45,  category: "Danse Prive" },
  // Extra
  { id: 15, name: "VIP",               emoji: "👑", price: 3000, prime: 1200, category: "Extra" },
  { id: 16, name: "VIP+",              emoji: "💎", price: 5000, prime: 2000, category: "Extra" },
];

const categories = ["Tout", ...new Set(products.map(p => p.category))];
let activeCategory = "Tout";
let quantities = {}; // id -> qty

// ====== INIT ======
function init() {
  // Categories
  const catEl = document.getElementById('categories');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    };
    catEl.appendChild(btn);
  });

  renderProducts();
  renderCart();
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  const filtered = activeCategory === 'Tout' ? products : products.filter(p => p.category === activeCategory);

  filtered.forEach(p => {
    const qty = quantities[p.id] || 0;
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-name">${p.name}</div>
      <div class="product-price">$${p.price}</div>
      <div class="product-prime">Prime: $${p.prime}</div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="updateQty(${p.id}, -1)">−</button>
        <input class="qty-display" type="number" min="0" value="${qty}" onchange="setQty(${p.id}, this.value)" />
        <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function updateQty(id, delta) {
  const current = quantities[id] || 0;
  const newVal = Math.max(0, current + delta);
  quantities[id] = newVal;
  renderProducts();
  renderCart();
}

function setQty(id, val) {
  const v = parseInt(val) || 0;
  quantities[id] = Math.max(0, v);
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const cartItems = products.filter(p => (quantities[p.id] || 0) > 0);

  // Count
  const totalItems = cartItems.reduce((s, p) => s + (quantities[p.id] || 0), 0);
  document.getElementById('cart-count').textContent = totalItems;

  if (cartItems.length === 0) {
    container.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        Aucun produit sélectionné
      </div>
    `;
    document.getElementById('sum-items').textContent = '$0';
    document.getElementById('sum-total').textContent = '$0';
    document.getElementById('prime-amount').textContent = '$0';
    document.getElementById('prime-sub').textContent = 'Aucune vente enregistrée';
    return;
  }

  let html = '';
  let total = 0, totalPrime = 0;

  cartItems.forEach(p => {
    const qty = quantities[p.id];
    const sub = p.price * qty;
    const primeTotal = p.prime * qty;
    total += sub;
    totalPrime += primeTotal;
    html += `
      <div class="cart-item">
        <span class="cart-item-emoji">${p.emoji}</span>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-sub">x${qty} × $${p.price}</div>
          <div class="cart-item-prime-badge">Prime: $${primeTotal}</div>
        </div>
        <div>
          <div class="cart-item-price">$${sub}</div>
        </div>
        <button class="remove-btn" onclick="removeItem(${p.id})">✕</button>
      </div>
    `;
  });

  container.innerHTML = html;
  document.getElementById('sum-items').textContent = `$${total}`;
  document.getElementById('sum-total').textContent = `$${total}`;
  document.getElementById('prime-amount').textContent = `$${totalPrime}`;
  document.getElementById('prime-sub').textContent = `${totalItems} article${totalItems > 1 ? 's' : ''} vendu${totalItems > 1 ? 's' : ''}`;
}

function removeItem(id) {
  quantities[id] = 0;
  renderProducts();
  renderCart();
}

function resetCart() {
  quantities = {};
  renderProducts();
  renderCart();
  showToast('🔄 Caisse réinitialisée');
}

function validateOrder() {
  const cartItems = products.filter(p => (quantities[p.id] || 0) > 0);
  if (cartItems.length === 0) {
    showToast('⚠️ Aucun produit sélectionné !');
    return;
  }
  const total = cartItems.reduce((s, p) => s + p.price * (quantities[p.id] || 0), 0);
  const prime = cartItems.reduce((s, p) => s + p.prime * (quantities[p.id] || 0), 0);
  showToast(`✅ Vente validée — Total: $${total} | Prime: $${prime}`);
  setTimeout(() => {
    quantities = {};
    renderProducts();
    renderCart();
  }, 1500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
