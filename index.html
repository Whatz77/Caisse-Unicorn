<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNICORN - Primes Employes</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08050f;
    --panel: #110d1f;
    --card: #1a1030;
    --border: #3b1f5e;
    --accent: #c084fc;
    --accent2: #e879f9;
    --danger: #ff4f6a;
    --text: #e2eaf5;
    --muted: #6b82a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(192,132,252,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(232,121,249,0.05) 0%, transparent 50%);
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent2);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(1.3); }
  }
  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header span {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-right { margin-left: auto; }
  .server-badge {
    background: rgba(232,121,249,0.1);
    border: 1px solid rgba(232,121,249,0.3);
    color: var(--accent2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 360px;
    height: calc(100vh - 57px);
  }
  .products-panel {
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-btn:hover, .cat-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192,132,252,0.1);
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: all 0.2s;
  }
  .product-card:hover {
    border-color: rgba(192,132,252,0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .product-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text);
  }
  .product-price {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .product-prime {
    font-size: 0.78rem;
    color: var(--accent2);
    margin-bottom: 12px;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 34px; height: 34px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .qty-btn.plus {
    background: rgba(192,132,252,0.15);
    border: 2px solid rgba(192,132,252,0.5);
    color: var(--accent);
  }
  .qty-btn.plus:hover, .qty-btn.plus:active {
    background: rgba(192,132,252,0.35);
    border-color: var(--accent);
  }
  .qty-btn.minus {
    background: rgba(255,79,106,0.1);
    border: 2px solid rgba(255,79,106,0.4);
    color: var(--danger);
  }
  .qty-btn.minus:hover, .qty-btn.minus:active {
    background: rgba(255,79,106,0.25);
    border-color: var(--danger);
  }
  .qty-display {
    flex: 1;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    min-width: 36px;
  }
  .cart-panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .cart-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .cart-count {
    background: var(--accent);
    color: var(--bg);
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .cart-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .cart-empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.4; }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(59,31,94,0.5);
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
  }
  .cart-item-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .cart-item-prime-badge { font-size: 0.7rem; color: var(--accent2); font-weight: 600; }
  .cart-item-price {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .remove-btn {
    background: none;
    border: none;
    color: rgba(255,79,106,0.5);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
  }
  .remove-btn:hover { color: var(--danger); }
  .cart-summary {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: rgba(0,0,0,0.2);
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .summary-row.total {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    border-top: 1px solid var(--border);
    margin-top: 6px;
    padding-top: 12px;
  }
  .summary-val.blue { color: var(--accent); font-weight: 600; }
  .prime-box {
    background: linear-gradient(135deg, rgba(232,121,249,0.08), rgba(192,132,252,0.05));
    border: 1px solid rgba(232,121,249,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 12px;
  }
  .prime-box-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .prime-box-amount {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(232,121,249,0.4);
  }
  .prime-box-sub { font-size: 0.72rem; color: rgba(232,121,249,0.6); margin-top: 2px; }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    padding: 11px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-reset {
    background: rgba(255,79,106,0.15);
    color: var(--danger);
    border: 1px solid rgba(255,79,106,0.3);
  }
  .btn-reset:hover { background: rgba(255,79,106,0.25); }
  .btn-validate {
    background: linear-gradient(135deg, #c084fc, #9333ea);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 4px 15px rgba(192,132,252,0.3);
  }
  .btn-validate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,132,252,0.4); }
  .toast {
    position: fixed;
    top: 70px; right: 20px;
    background: var(--card);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .products-panel::-webkit-scrollbar { width: 4px; }
  .products-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; height: auto; }
    .cart-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: auto;
      max-height: 50vh;
      border-top: 2px solid var(--border);
      z-index: 50;
    }
    .products-panel { padding-bottom: 360px; border-right: none; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <div>
    <h1>UNICORN</h1>
    <span>Systeme de primes employes</span>
  </div>
  <div class="header-right">
    <span class="server-badge">EN LIGNE</span>
  </div>
</header>

<div class="app">
  <div class="products-panel">
    <div class="section-title">Produits</div>
    <div class="categories" id="categories"></div>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <div class="cart-panel">
    <div class="cart-header">
      <span class="cart-title">Commande</span>
      <span class="cart-count" id="cart-count">0</span>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">
        <div class="cart-empty-icon">&#128722;</div>
        Aucun produit selectionne
      </div>
    </div>
    <div class="cart-summary">
      <div class="summary-row">
        <span>Sous-total</span>
        <span class="summary-val blue" id="sum-items">$0</span>
      </div>
      <div class="summary-row total">
        <span>Total vente</span>
        <span class="summary-val blue" id="sum-total">$0</span>
      </div>
      <div class="prime-box">
        <div class="prime-box-label">PRIME EMPLOYE</div>
        <div class="prime-box-amount" id="prime-amount">$0</div>
        <div class="prime-box-sub" id="prime-sub">Aucune vente enregistree</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-reset" id="btn-reset">RESET</button>
        <button class="btn btn-validate" id="btn-validate">VALIDER</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var products = [
  { id: 1,  name: "Jupiler",           price: 10,   prime: 4,    category: "Biere" },
  { id: 2,  name: "Biere Simple",      price: 15,   prime: 6,    category: "Biere" },
  { id: 3,  name: "Biere Triple",      price: 35,   prime: 14,   category: "Biere" },
  { id: 4,  name: "Whisky",            price: 45,   prime: 18,   category: "Alcool" },
  { id: 5,  name: "Vodka",             price: 40,   prime: 16,   category: "Alcool" },
  { id: 6,  name: "Rhum",              price: 40,   prime: 16,   category: "Alcool" },
  { id: 7,  name: "Vodka Cherry",      price: 50,   prime: 20,   category: "Alcool" },
  { id: 8,  name: "Vin",               price: 70,   prime: 28,   category: "Vin" },
  { id: 9,  name: "Champagne",         price: 150,  prime: 60,   category: "Vin" },
  { id: 10, name: "Magnum",            price: 200,  prime: 80,   category: "Vin" },
  { id: 11, name: "Chips",             price: 5,    prime: 2,    category: "Soft" },
  { id: 12, name: "Biere Sans Alcool", price: 8,    prime: 3,    category: "Soft" },
  { id: 13, name: "Soda",              price: 5,    prime: 2,    category: "Soft" },
  { id: 14, name: "Eau",               price: 5,    prime: 2,    category: "Soft" },
  { id: 17, name: "Danse 10min",       price: 200,  prime: 120,  category: "Danse Privee" },
  { id: 18, name: "Danse 20min",       price: 400,  prime: 240,  category: "Danse Privee" },
  { id: 19, name: "Supplement 5min",   price: 75,   prime: 45,   category: "Danse Privee" },
  { id: 15, name: "VIP",               price: 3000, prime: 1200, category: "Extra" },
  { id: 16, name: "VIP+",              price: 5000, prime: 2000, category: "Extra" }
];

var quantities = {};
var activeCategory = "Tout";

var allCategories = ["Tout"];
products.forEach(function(p) {
  if (allCategories.indexOf(p.category) === -1) allCategories.push(p.category);
});

function init() {
  var catEl = document.getElementById('categories');
  allCategories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = function() {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderProducts();
    };
    catEl.appendChild(btn);
  });

  document.getElementById('btn-reset').onclick = resetCart;
  document.getElementById('btn-validate').onclick = validateOrder;

  renderProducts();
  renderCart();
}

function renderProducts() {
  var grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  var filtered = activeCategory === 'Tout' ? products : products.filter(function(p) { return p.category === activeCategory; });

  filtered.forEach(function(p) {
    var qty = quantities[p.id] || 0;
    var card = document.createElement('div');
    card.className = 'product-card';

    var name = document.createElement('div');
    name.className = 'product-name';
    name.textContent = p.name;

    var price = document.createElement('div');
    price.className = 'product-price';
    price.textContent = '$' + p.price;

    var prime = document.createElement('div');
    prime.className = 'product-prime';
    prime.textContent = 'Prime: $' + p.prime;

    var qtyControl = document.createElement('div');
    qtyControl.className = 'qty-control';

    var minusBtn = document.createElement('button');
    minusBtn.className = 'qty-btn minus';
    minusBtn.textContent = '-';
    minusBtn.setAttribute('data-id', p.id);
    minusBtn.setAttribute('data-delta', '-1');

    var qtySpan = document.createElement('span');
    qtySpan.className = 'qty-display';
    qtySpan.id = 'qty-' + p.id;
    qtySpan.textContent = qty;

    var plusBtn = document.createElement('button');
    plusBtn.className = 'qty-btn plus';
    plusBtn.textContent = '+';
    plusBtn.setAttribute('data-id', p.id);
    plusBtn.setAttribute('data-delta', '1');

    minusBtn.addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-id'));
      updateQty(id, -1);
    });
    plusBtn.addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-id'));
      updateQty(id, 1);
    });

    qtyControl.appendChild(minusBtn);
    qtyControl.appendChild(qtySpan);
    qtyControl.appendChild(plusBtn);

    card.appendChild(name);
    card.appendChild(price);
    card.appendChild(prime);
    card.appendChild(qtyControl);

    grid.appendChild(card);
  });
}

function updateQty(id, delta) {
  var current = quantities[id] || 0;
  var newVal = Math.max(0, current + delta);
  quantities[id] = newVal;
  var qtyEl = document.getElementById('qty-' + id);
  if (qtyEl) qtyEl.textContent = newVal;
  renderCart();
}

function renderCart() {
  var container = document.getElementById('cart-items');
  var cartItems = products.filter(function(p) { return (quantities[p.id] || 0) > 0; });
  var totalItems = 0;
  cartItems.forEach(function(p) { totalItems += quantities[p.id] || 0; });
  document.getElementById('cart-count').textContent = totalItems;

  if (cartItems.length === 0) {
    container.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">&#128722;</div>Aucun produit selectionne</div>';
    document.getElementById('sum-items').textContent = '$0';
    document.getElementById('sum-total').textContent = '$0';
    document.getElementById('prime-amount').textContent = '$0';
    document.getElementById('prime-sub').textContent = 'Aucune vente enregistree';
    return;
  }

  var html = '';
  var total = 0, totalPrime = 0;
  cartItems.forEach(function(p) {
    var qty = quantities[p.id];
    var sub = p.price * qty;
    var primeTotal = p.prime * qty;
    total += sub;
    totalPrime += primeTotal;
    html += '<div class="cart-item">';
    html += '<div class="cart-item-info">';
    html += '<div class="cart-item-name">' + p.name + '</div>';
    html += '<div class="cart-item-sub">x' + qty + ' x $' + p.price + '</div>';
    html += '<div class="cart-item-prime-badge">Prime: $' + primeTotal + '</div>';
    html += '</div>';
    html += '<div class="cart-item-price">$' + sub + '</div>';
    html += '<button class="remove-btn" onclick="removeItem(' + p.id + ')">x</button>';
    html += '</div>';
  });

  container.innerHTML = html;
  document.getElementById('sum-items').textContent = '$' + total;
  document.getElementById('sum-total').textContent = '$' + total;
  document.getElementById('prime-amount').textContent = '$' + totalPrime;
  document.getElementById('prime-sub').textContent = totalItems + ' article' + (totalItems > 1 ? 's' : '') + ' vendu' + (totalItems > 1 ? 's' : '');
}

function removeItem(id) {
  quantities[id] = 0;
  var qtyEl = document.getElementById('qty-' + id);
  if (qtyEl) qtyEl.textContent = 0;
  renderCart();
}

function resetCart() {
  quantities = {};
  renderProducts();
  renderCart();
  showToast('Caisse reinitialisee');
}

function validateOrder() {
  var cartItems = products.filter(function(p) { return (quantities[p.id] || 0) > 0; });
  if (cartItems.length === 0) { showToast('Aucun produit selectionne !'); return; }
  var total = 0, prime = 0;
  cartItems.forEach(function(p) { total += p.price * (quantities[p.id] || 0); prime += p.prime * (quantities[p.id] || 0); });
  showToast('Vente validee - Total: $' + total + ' | Prime: $' + prime);
  setTimeout(function() { quantities = {}; renderProducts(); renderCart(); }, 2000);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

init();
</script>
</body>
</html>
